apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cannonball.fullname" . }}
  labels:
    {{- include "cannonball.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_USERNAME: {{ .Values.env.APP_USERNAME | quote }}
  APP_ADMIN_DISPLAY_NAME: {{ .Values.env.APP_ADMIN_DISPLAY_NAME | quote }}
  APP_ADMIN_EMAIL: {{ .Values.env.APP_ADMIN_EMAIL | quote }}
  APP_PASSWORD: {{ .Values.env.APP_PASSWORD | quote }}
  APP_PASSWORD_HASH: {{ .Values.env.APP_PASSWORD_HASH | quote }}
  AUTH_MODE: {{ .Values.env.AUTH_MODE | quote }}
  MATTERMOST_BASE_URL: {{ .Values.env.MATTERMOST_BASE_URL | quote }}
  MATTERMOST_TOKEN: {{ .Values.env.MATTERMOST_TOKEN | quote }}
  MATTERMOST_TEAM_ID: {{ .Values.env.MATTERMOST_TEAM_ID | quote }}
  MATTERMOST_TEAM_NAME: {{ .Values.env.MATTERMOST_TEAM_NAME | quote }}
  MATTERMOST_CHANNELS: {{ .Values.env.MATTERMOST_CHANNELS | quote }}
  N8N_BASE_URL: {{ .Values.env.N8N_BASE_URL | quote }}
  N8N_WEBHOOK_URL: {{ .Values.env.N8N_WEBHOOK_URL | quote }}
  N8N_API_KEY: {{ .Values.env.N8N_API_KEY | quote }}
  N8N_WEBHOOK_SECRET: {{ .Values.env.N8N_WEBHOOK_SECRET | quote }}
  N8N_INBOUND_SECRET: {{ .Values.env.N8N_INBOUND_SECRET | quote }}
  APP_BASE_URL: {{ .Values.env.APP_BASE_URL | quote }}
  SMTP_HOST: {{ .Values.env.SMTP_HOST | quote }}
  SMTP_PORT: {{ .Values.env.SMTP_PORT | quote }}
  SMTP_USERNAME: {{ .Values.env.SMTP_USERNAME | quote }}
  SMTP_PASSWORD: {{ .Values.env.SMTP_PASSWORD | quote }}
  SMTP_FROM_EMAIL: {{ .Values.env.SMTP_FROM_EMAIL | quote }}
  SMTP_FROM_NAME: {{ .Values.env.SMTP_FROM_NAME | quote }}
  SMTP_USE_SSL: {{ .Values.env.SMTP_USE_SSL | quote }}
  KEYCLOAK_ISSUER_URL: {{ .Values.env.KEYCLOAK_ISSUER_URL | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.env.KEYCLOAK_CLIENT_ID | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.env.KEYCLOAK_CLIENT_SECRET | quote }}
  KEYCLOAK_SCOPES: {{ .Values.env.KEYCLOAK_SCOPES | quote }}
  KEYCLOAK_ADMIN_ROLE: {{ .Values.env.KEYCLOAK_ADMIN_ROLE | quote }}
